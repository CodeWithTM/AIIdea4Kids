<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Increasing vs Decreasing - Fun Learning for Kids</title>
    <link rel="stylesheet" href="increasing_decreasing.css">
</head>
<body>
    <!-- Cute notebook background -->
    <div class="notebook-background"></div>
    
    <!-- Decorative doodles -->
    <div class="doodle doodle-1">🎈</div>
    <div class="doodle doodle-2">⭐</div>
    <div class="doodle doodle-3">🌟</div>
    <div class="doodle doodle-4">✨</div>

    <!-- Sound toggle -->
    <button class="sound-toggle" id="soundToggle">🔊</button>
    <button class="narration-toggle" id="narrationToggle">🎤</button>

    <!-- Main Container -->
    <div class="container">
        <div class="title">🎉 Increasing vs Decreasing 🎉</div>

        <!-- Content Sections -->
        <div class="content-section">
            <!-- Increasing Section -->
            <div class="card increasing-card">
                <div class="card-title">📈 INCREASING</div>
                <div class="card-title" style="font-size: 20px; color: white; text-shadow: none; margin: 0;">Getting Bigger & More!</div>
                
                <div class="balloons-container" id="increasingBalloons">
                    <!-- Balloons will be generated here -->
                </div>

                <div class="counter-display" id="increasingCounter">0</div>
                <div class="emoji-reaction" id="increasingEmoji">😊</div>

                <div class="button-group">
                    <button class="action-btn increase-btn" onclick="increaseNumber()">➕ ADD MORE</button>
                </div>
            </div>

            <!-- Decreasing Section -->
            <div class="card decreasing-card">
                <div class="card-title">📉 DECREASING</div>
                <div class="card-title" style="font-size: 20px; color: white; text-shadow: none; margin: 0;">Getting Smaller & Less!</div>
                
                <div class="balloons-container" id="decreasingBalloons">
                    <!-- Balloons will be generated here -->
                </div>

                <div class="counter-display" id="decreasingCounter">8</div>
                <div class="emoji-reaction" id="decreasingEmoji">😊</div>

                <div class="button-group">
                    <button class="action-btn decrease-btn" onclick="decreaseNumber()">➖ TAKE AWAY</button>
                </div>
            </div>
        </div>

        <!-- Reset Button -->
        <div class="reset-button-section">
            <button class="action-btn reset-btn" onclick="resetAll()">🔄 RESET & PLAY AGAIN</button>
        </div>
    </div>

    <script src="increasing_decreasing.js"></script>
</body>
</html>
